<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serikat Ekonomi Pesantren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-content { display: none; animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 8px; }
        .page-num.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="font-sans text-gray-800 bg-gray-50 min-h-screen flex flex-col">

    <nav class="bg-white shadow-md fixed w-full z-50 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 items-center justify-start">
                <div class="hidden md:flex space-x-8">
                    <button onclick="navigate('beranda')" class="nav-link text-blue-600 font-semibold focus:outline-none" data-target="beranda">Beranda</button>
                    <button onclick="navigate('tentang')" class="nav-link text-gray-600 font-medium focus:outline-none" data-target="tentang">Tentang Kami</button>
                    <button onclick="navigate('program')" class="nav-link text-gray-600 font-medium focus:outline-none" data-target="program">Program</button>
                    <button onclick="navigate('berita')" class="nav-link text-gray-600 font-medium focus:outline-none" data-target="berita">Berita</button>
                    <button onclick="navigate('kontak')" class="nav-link text-gray-600 font-medium focus:outline-none" data-target="kontak">Kontak</button>
                </div>
                <div class="md:hidden flex items-center ml-auto">
                    <button onclick="toggleMobileMenu()" class="text-gray-600 focus:outline-none">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 absolute w-full left-0 shadow-lg top-16">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <button onclick="navigateMobile('beranda')" class="nav-link-mobile block w-full text-left px-3 py-2 text-blue-600 bg-blue-50" data-target="beranda">Beranda</button>
                <button onclick="navigateMobile('tentang')" class="nav-link-mobile block w-full text-left px-3 py-2 text-gray-600" data-target="tentang">Tentang Kami</button>
                <button onclick="navigateMobile('program')" class="nav-link-mobile block w-full text-left px-3 py-2 text-gray-600" data-target="program">Program</button>
                <button onclick="navigateMobile('berita')" class="nav-link-mobile block w-full text-left px-3 py-2 text-gray-600" data-target="berita">Berita</button>
                <button onclick="navigateMobile('kontak')" class="nav-link-mobile block w-full text-left px-3 py-2 text-gray-600" data-target="kontak">Kontak</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-16">
        <section id="beranda" class="page-content active">
            <div class="pt-24 pb-12 md:pt-32 md:pb-24 bg-blue-600 text-white">
                <div class="max-w-7xl mx-auto px-4 text-center">
                    <img src="https://ui-avatars.com/api/?name=SEP&background=0f766e&color=fff&size=200&bold=true" class="h-32 w-32 mx-auto object-cover rounded-full border-4 border-white shadow-2xl bg-white mb-8">
                    <h1 class="text-4xl md:text-5xl font-extrabold mb-4 uppercase">Serikat Ekonomi Pesantren</h1>
                    <p class="text-blue-100 max-w-3xl mx-auto leading-relaxed">Gerakan kolaboratif untuk menguatkan potensi ekonomi pesantren, menciptakan ekosistem mandiri dan berkelanjutan.</p>
                </div>
            </div>
        </section>

        <section id="tentang" class="page-content py-16 bg-white">
            <div class="max-w-7xl mx-auto px-4 text-center"><h2 class="text-3xl font-bold">Tentang Kami</h2><div class="w-24 h-1 bg-blue-600 mx-auto mt-4"></div></div>
        </section>

        <section id="program" class="page-content py-16 bg-gray-50">
            <div class="max-w-7xl mx-auto px-4 text-center"><h2 class="text-3xl font-bold">Program Utama</h2><div class="w-24 h-1 bg-blue-600 mx-auto mt-4"></div></div>
        </section>

        <section id="berita" class="page-content py-16 bg-white min-h-[600px]">
            <div class="max-w-7xl mx-auto px-4">
                <div class="text-center mb-12"><h2 class="text-3xl font-bold">Portal Berita SEP</h2><div class="w-24 h-1 bg-blue-600 mx-auto mt-4"></div></div>
                <div id="berita-utama-container" class="mb-12"></div>
                <div id="berita-grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
                <div id="pagination-controls" class="mt-16 flex justify-center space-x-2"></div>
            </div>
        </section>

        <section id="kontak" class="page-content py-16 bg-gray-50">
            <div class="max-w-7xl mx-auto px-4 text-center"><h2 class="text-3xl font-bold">Hubungi Kami</h2><div class="w-24 h-1 bg-blue-600 mx-auto mt-4"></div></div>
        </section>
        
        <div id="modal-berita" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm flex justify-center items-center p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl transform scale-95 transition-transform duration-300" id="modal-content-box">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Portal Berita SEP</span>
                    <button onclick="tutupBerita()" class="w-8 h-8 flex items-center justify-center bg-red-100 text-red-600 rounded-full hover:bg-red-500 hover:text-white transition-colors font-bold">&times;</button>
                </div>
                <div class="overflow-y-auto p-6 md:p-10 custom-scrollbar">
                    <img id="modal-gambar" src="" class="w-full h-64 md:h-96 object-cover rounded-2xl mb-8 shadow-sm">
                    <span id="modal-tanggal" class="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-lg mb-4 inline-block"></span>
                    <h2 id="modal-judul" class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-6 leading-tight"></h2>
                    <div id="modal-isi" class="text-gray-600 leading-relaxed text-lg space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="ai-widget" class="fixed bottom-6 right-6 z-50">
        <button onclick="toggleChat()" class="bg-blue-600 text-white rounded-2xl p-4 shadow-2xl hover:scale-110 active:scale-90 transition-all">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
        </button>
        <div id="ai-panel" class="hidden absolute bottom-20 right-0 w-80 sm:w-96 bg-white rounded-3xl shadow-2xl border flex flex-col overflow-hidden transition-all duration-300" style="height: 480px;">
            <div class="bg-blue-600 text-white p-5 flex justify-between items-center"><h3 class="font-bold">Asisten AI SEP</h3><button onclick="toggleChat()">&times;</button></div>
            <div id="chat-history" class="flex-grow p-4 overflow-y-auto chat-scroll bg-gray-50 flex flex-col gap-4 text-sm"></div>
            <div class="p-4 bg-white border-t"><form onsubmit="handleChatSubmit(event)" class="flex gap-2"><input type="text" id="chat-input" class="flex-grow px-4 py-2 bg-gray-100 rounded-xl" required><button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-xl">Kirim</button></form></div>
        </div>
    </div>

    <script src="data-berita.js"></script>

    <script>
        // NAVIGATION LOGIC
        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
        function navigateMobile(pageId) { navigate(pageId); toggleMobileMenu(); }
        function navigate(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // NEWS RENDER LOGIC
        let currentPage = 1; const itemsPerPage = 5;
        function renderBerita() {
            const utContainer = document.getElementById('berita-utama-container');
            const grContainer = document.getElementById('berita-grid-container');
            const pgControls = document.getElementById('pagination-controls');
            
            // dataBerita diambil dari data-berita.js
            if (typeof dataBerita === 'undefined' || dataBerita.length === 0) return;
            
            const startIdx = (currentPage - 1) * itemsPerPage;
            const currentData = dataBerita.slice(startIdx, startIdx + itemsPerPage);

            utContainer.innerHTML = ''; grContainer.innerHTML = ''; pgControls.innerHTML = '';

            const fb = currentData[0];
            if(fb) {
                utContainer.innerHTML = `
                    <article class="group bg-white rounded-3xl shadow-lg border flex flex-col md:flex-row min-h-[350px]">
                        <div class="w-full md:w-3/5 overflow-hidden"><img src="${fb.gambar}" class="w-full h-full object-cover"></div>
                        <div class="w-full md:w-2/5 p-8 flex flex-col justify-center items-start">
                            <span class="px-3 py-1 bg-blue-100 text-blue-600 text-[10px] font-black uppercase rounded-lg mb-4">Utama</span>
                            <h3 class="text-2xl font-bold mb-4">${fb.judul}</h3>
                            <p class="text-gray-500 text-sm line-clamp-3 mb-6">${fb.ringkasan}</p>
                            <button onclick="bukaBerita(${fb.id})" class="text-blue-600 font-bold text-sm bg-blue-50 px-4 py-2 rounded-lg hover:bg-blue-100">Baca Selengkapnya &rarr;</button>
                        </div>
                    </article>`;
            }

            currentData.slice(1).forEach(b => {
                grContainer.innerHTML += `
                    <article class="bg-white rounded-2xl shadow-sm border flex flex-col h-full">
                        <div class="h-40 overflow-hidden"><img src="${b.gambar}" class="w-full h-full object-cover"></div>
                        <div class="p-5 flex-grow flex flex-col">
                            <span class="text-[9px] text-gray-400 font-bold mb-2">${b.tanggal}</span>
                            <h4 class="font-bold text-sm mb-3 line-clamp-2">${b.judul}</h4>
                            <p class="text-gray-400 text-xs line-clamp-2 mb-4">${b.ringkasan}</p>
                            <button onclick="bukaBerita(${b.id})" class="text-blue-600 font-bold text-xs mt-auto self-start">Selengkapnya &rarr;</button>
                        </div>
                    </article>`;
            });

            const total = Math.ceil(dataBerita.length / itemsPerPage);
            for (let i = 1; i <= total; i++) {
                const btn = document.createElement('button');
                btn.className = `page-num px-4 py-2 rounded-xl border font-bold ${i === currentPage ? 'active' : 'bg-white text-gray-400'}`;
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderBerita(); document.getElementById('berita').scrollIntoView(); };
                pgControls.appendChild(btn);
            }
        }
        
        // MODAL BERITA LOGIC
        function bukaBerita(id) {
            const berita = dataBerita.find(b => b.id === id);
            if (!berita) return;
            document.getElementById('modal-gambar').src = berita.gambar;
            document.getElementById('modal-tanggal').innerText = berita.tanggal;
            document.getElementById('modal-judul').innerText = berita.judul;
            document.getElementById('modal-isi').innerHTML = berita.isiLengkap ? berita.isiLengkap : berita.ringkasan;
            
            const modal = document.getElementById('modal-berita');
            const contentBox = document.getElementById('modal-content-box');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); contentBox.classList.remove('scale-95'); }, 10);
        }

        function tutupBerita() {
            const modal = document.getElementById('modal-berita');
            const contentBox = document.getElementById('modal-content-box');
            modal.classList.add('opacity-0'); contentBox.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // AI LOGIC
        const apiKey = ""; // Isi API Key Anda di sini
        function toggleChat() { document.getElementById('ai-panel').classList.toggle('hidden'); }
        async function handleChatSubmit(e) { /* Logika Gemini AI (sudah ada di kode Anda sebelumnya) */ e.preventDefault(); }
        
        // Render pertama kali saat web dibuka
        renderBerita();
    </script>
</body>
</html>
